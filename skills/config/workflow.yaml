skill: config
version: '1.1'
compiled_at: '2026-03-29'
compiled_by: manual
workflows:
- id: config_operations
  trigger: When the user wants to read, show, or change a pawlia configuration setting
    (interfaces, TTS, transcription, agents, skill-config)
  max_steps: 6
  goal_check:
    prompt: Has the configuration been read or updated as requested?
    max_retries: 2
  building_blocks:
  - id: show_config
    command: python {scripts_dir}/config.py show
    description: Show all settable configuration sections (interfaces, tts, transcription,
      agents, skill-config)
    status_desc: Lese Konfiguration
    verify:
      exit_code: 0
      output_not_contains:
      - '"success": false'
  - id: show_section
    command: python {scripts_dir}/config.py show --section {section}
    description: Show a specific configuration section
    status_desc: Lese Sektion {section}
    verify:
      exit_code: 0
      output_not_contains:
      - '"success": false'
  - id: get_value
    command: python {scripts_dir}/config.py get --path {path}
    description: Get a specific configuration value by dot-notation path
    status_desc: Lese {path}
    verify:
      exit_code: 0
      output_not_contains:
      - '"success": false'
  - id: set_value
    command: python {scripts_dir}/config.py set --path {path} --value {value}
    description: Set a configuration value by dot-notation path (value is parsed as
      YAML scalar — true/false/numbers/strings)
    status_desc: Setze {path} = {value}
    verify:
      exit_code: 0
      output_not_contains:
      - '"success": false'
- id: model_switch
  trigger: When the user wants to switch, change, or show the active model
  max_steps: 3
  goal_check:
    prompt: Has the model been shown or changed as requested?
    max_retries: 1
  building_blocks:
  - id: show_model
    command: python {scripts_dir}/config.py model
    description: Show the currently active model
    status_desc: Zeige aktives Modell
    verify:
      exit_code: 0
  - id: set_model
    command: python {scripts_dir}/config.py model --name {name}
    description: Switch the active model at runtime (takes effect immediately)
    status_desc: Wechsle Modell zu {name}
    verify:
      exit_code: 0
      output_not_contains:
      - '"success": false'
- id: private_mode
  trigger: When the user wants to enable or disable private mode for the session or a thread
  max_steps: 2
  goal_check:
    prompt: Has private mode been toggled as requested?
    max_retries: 1
  building_blocks:
  - id: private_on
    command: python {scripts_dir}/config.py private
    description: Enable private mode for the current session (messages won't be saved)
    status_desc: Private Mode aktivieren
    verify:
      exit_code: 0
  - id: private_on_thread
    command: python {scripts_dir}/config.py private --thread {thread_id}
    description: Enable private mode for a specific thread
    status_desc: Private Mode für Thread aktivieren
    verify:
      exit_code: 0
  - id: private_off
    command: python {scripts_dir}/config.py private --off
    description: Disable private mode for the current session
    status_desc: Private Mode deaktivieren
    verify:
      exit_code: 0
  - id: private_off_thread
    command: python {scripts_dir}/config.py private --thread {thread_id} --off
    description: Disable private mode for a specific thread
    status_desc: Private Mode für Thread deaktivieren
    verify:
      exit_code: 0
