skill: browser
version: '1.0'
compiled_at: '2026-03-26'
compiled_by: workflow_compiler
workflows:
- id: browser_workflow
  trigger: User provides a browser automation command or URL
  max_steps: 20
  building_blocks:
  - id: open_block
    command: python {scripts_dir}/browser.py open {url}
    description: Open specified URL in browser
    status_desc: Öffne {url}
    verify:
      exit_code: 0
      output_contains:
      - Page loaded
      output_not_contains:
      - Error
    on_error: show_block
  - id: show_block
    command: python {scripts_dir}/browser.py show
    description: Show current page content and elements
    status_desc: Zeige aktuelle Seite an
    verify:
      exit_code: 0
  - id: back_block
    command: python {scripts_dir}/browser.py back
    description: Navigate back in history
    status_desc: Gehe zurück
    verify:
      exit_code: 0
      output_not_contains:
      - No history
  - id: click_block
    command: python {scripts_dir}/browser.py click {element_id}
    description: Click specified element
    status_desc: Klicke {element_id}
    verify:
      exit_code: 0
      output_not_contains:
      - Element is not clickable
    on_error: show_block
  - id: fill_block
    command: python {scripts_dir}/browser.py fill {element_id} {value}
    description: Fill input element with value
    status_desc: Fülle {element_id} mit {value}
    verify:
      exit_code: 0
      output_not_contains:
      - Element is not fillable
    on_error: show_block
  - id: submit_block
    command: python {scripts_dir}/browser.py submit {form_id}
    description: Submit form with filled values
    status_desc: Reiche Formular {form_id} ein
    verify:
      exit_code: 0
      output_not_contains:
      - No form
