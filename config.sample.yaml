providers:
  ollama:
    apiKey: ollama
    apiBase: http://localhost:11434/v1
    timeout: 240
    keepAlive: -1
  # groq:
  #   apiKey: gsk_...
  #   apiBase: https://api.groq.com/openai/v1

agents:
  defaults:
    model: qwen3:4b
    provider: ollama    # which provider block to use (default: first configured)
    think: false
    temperature: 0.7

  # chat:
  #   model: qwen3.5:latest
  #   think: true
  #   temperature: 0.9

  # skill_runner:     # default LLM for all skills (falls back to defaults)
  #   model: qwen3.5:latest
  #   think: true
  #   temperature: 0.3

  # vision:           # falls back to chat if not set
  #   model: qwen2.5vl:latest

  # skills:           # per-skill overrides (fall back to skill_runner)
  #   searxng:
  #     model: qwen3:4b
  #     provider: groq
  #   browser:
  #     model: llama3.1:8b
  #     provider: ollama

interfaces:
  # Remove the comment to enable an interface.

  # webhook:
  #   port: 8080

  # telegram:
  #   token: YOUR_TELEGRAM_BOT_TOKEN

  # matrix:
  #   homeserver: https://matrix.org
