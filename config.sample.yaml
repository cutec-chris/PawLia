providers:
  ollama:
    apiBase: http://localhost:11434/v1
    apiKey: ollama
    timeout: 240
    keepAlive: -1
  # groq:
  #   apiBase: https://api.groq.com/openai/v1
  #   apiKey: gsk_...

# Named model definitions.  Each entry bundles a model name, provider, and
# generation parameters.  Agent types and skills reference these by key.
models:
  fast:
    model: qwen3.5:4b
    provider: ollama
    temperature: 0.7
  # smart:
  #   model: qwen3.5:latest
  #   provider: ollama
  #   temperature: 0.9
  #   think: true
  # vision:
  #   model: qwen2.5vl:latest
  #   provider: ollama
  # groq-fast:
  #   model: qwen3:4b
  #   provider: groq
  #   temperature: 0.3

# Assign a model (by key) to each agent type.
# Fallback chain: chat/vision/skill_runner → default
#                 skill.<name> → skill_runner → default
agents:
  default: fast       # global fallback — must point to a key in models:
  # chat: smart
  # skill_runner: fast
  # vision: vision
  # skills:           # per-skill overrides
  #   searxng: groq-fast
  #   browser: smart

interfaces:
  # Remove the comment to enable an interface.

  # web:
  #   port: 8888          # Web-UI with chat, provider & model management
  #   # token: mysecret   # optional — auto-generated and printed to console if omitted

  # webhook:
  #   port: 8080

  # telegram:
  #   token: YOUR_TELEGRAM_BOT_TOKEN

  # matrix:
  #   homeserver: https://matrix.org
  #   user_id: "@yourbot:matrix.org"
  #   password: YOUR_PASSWORD
  #   # access_token: OR_USE_THIS_INSTEAD_OF_PASSWORD
  #   # stun_servers:                        # STUN for VoIP (optional)
  #   #   - stun:stun.l.google.com:19302

# Speech-to-text transcription (voice messages + VoIP calls).
# Any OpenAI-compatible /audio/transcriptions endpoint works.
# transcription:
#   provider: groq
#   groq:
#     api_key: YOUR_GROQ_API_KEY
#     model: whisper-large-v3-turbo
#     # base_url: https://api.groq.com/openai/v1   # set automatically; override if needed
#     # language: de

#   # Other API (OpenAI or self-hosted):
#   # provider: openai
#   # openai:
#   #   api_key: YOUR_API_KEY
#   #   base_url: https://api.openai.com/v1
#   #   model: whisper-1
#   #   # language: de

#   # Local (no API key; requires FFmpeg + faster-whisper):
#   # provider: local
#   # local:
#   #   model: base        # tiny | base | small | medium | large-v3
#   #   device: cpu        # cpu | cuda
#   #   compute_type: int8
#   #   # language: de

# Text-to-speech for VoIP call responses — pick one provider and uncomment it.
# tts:
#   provider: piper                # local TTS, no internet needed (model pre-installed in Docker)
#   piper:
#     executable: piper
#     model: /app/piper/de_DE-kerstin-low.onnx
#     config: /app/piper/de_DE-kerstin-low.onnx.json
#     sample_rate: 16000
#
#   # provider: edge               # Microsoft Edge TTS (requires internet)
#   # edge:
#   #   voice: de-DE-KatjaNeural   # run `edge-tts --list-voices` for options

skill-install:
  allow_remote: false      # allow skill installation via Matrix/Telegram file upload
  allow_workspace: false   # load skills from session/<user>/workspace/skills/ (default: false)

