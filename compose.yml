services:
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    # --- GPU support (uncomment ONE section) ---
    # NVIDIA (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # AMD ROCm:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri

  pawlia:
    build:
      context: .
      dockerfile: Dockerfile.voip
    restart: on-failure
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:8888:8888"   # Web UI
      # - "127.0.0.1:8080:8080" # Webhooks
    # --- Debugging (uncomment to enable) ---
    # command: ["python", "-m", "pawlia", "--mode", "server", "--debug"]
    # volumes below include a log mount for prompt logs when debugging
    volumes:
      # Required: your config (copy from config.sample.yaml and fill in)
      - ./config.yaml:/app/config.yaml
      # Persistent session data (memory, etc.)
      - ./session:/app/session
      # Debug logs (uncomment together with --debug above)
      # - ./log:/app/log
