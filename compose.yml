services:
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    # --- GPU support (uncomment ONE section) ---
    # NVIDIA (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # AMD ROCm:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri

  pawlia:
    build:
      context: .
      dockerfile: Dockerfile.voip
    restart: unless-stopped
    network_mode: host
    ports:
      - "127.0.0.1:8888:8888"   # Web UI
      # - "127.0.0.1:8080:8080" # Webhooks
    volumes:
      # Required: your config (copy from config.sample.yaml and fill in)
      - ./config.yaml:/app/config.yaml:ro
      # Persistent session data (memory, etc.)
      - ./session:/app/session
